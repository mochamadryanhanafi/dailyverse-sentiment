services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dailyverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dailyverse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dailyverse_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./db/migrations:/migrations:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dailyverse} -d ${POSTGRES_DB:-dailyverse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dailyverse}:${POSTGRES_PASSWORD:-dailyverse_secret}@db:5432/${POSTGRES_DB:-dailyverse_db}
      APP_ENV: ${APP_ENV:-development}
      APP_TITLE: ${APP_TITLE:-DailyVerse Sentiment API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      SECRET_KEY: ${SECRET_KEY:-change-this-long-random-secret-before-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-228773643545-ojdnob5n8i76kvihghm60eh261ahhf9l.apps.googleusercontent.com}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      DEFAULT_USER_ROLE: ${DEFAULT_USER_ROLE:-user}
      SCRAPER_PARALLELISM: ${SCRAPER_PARALLELISM:-2}
      SCRAPER_DELAY_SECONDS: ${SCRAPER_DELAY_SECONDS:-2}
      SCRAPER_START_YEAR: ${SCRAPER_START_YEAR:-2015}
      SCRAPER_END_YEAR: ${SCRAPER_END_YEAR:-2024}
      SCRAPER_TOTAL_TARGET: ${SCRAPER_TOTAL_TARGET:-600}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama3-8b-8192}
    ports:
      - "8003:8000"
    volumes:
      - backend_models:/app/models
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
      VITE_API_TARGET: http://backend:8000
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID:-228773643545-ojdnob5n8i76kvihghm60eh261ahhf9l.apps.googleusercontent.com}}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_models:
