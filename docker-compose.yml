services:
  db:
    image: postgres:16-alpine
    container_name: dailyverse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dailyverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dailyverse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dailyverse_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dailyverse} -d ${POSTGRES_DB:-dailyverse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
